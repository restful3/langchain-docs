<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" width="720" height="360">
  <rect x="0" y="0" width="720" height="360" fill="#FAFAF9"/>

  <!-- ============ 좌상: Planning · 할 일 목록 ============ -->
  <rect x="20" y="8" width="330" height="165" rx="8" fill="#FFFFFF" stroke="#0F2C59" stroke-width="1.5"/>
  <text x="40" y="33" font-family="sans-serif" font-size="11" fill="#6B6B72">METAPHOR</text>
  <text x="40" y="51" font-family="sans-serif" font-size="14" font-weight="bold" fill="#0F2C59">계획 수립</text>
  <text x="120" y="51" font-family="sans-serif" font-size="11" fill="#6B6B72">· Planning</text>
  <text x="40" y="69" font-family="sans-serif" font-size="11" font-weight="bold" fill="#0F2C59"><tspan>"할 일 목록"</tspan></text>

  <rect x="40" y="79" width="290" height="58" rx="4" fill="rgba(15,44,89,0.06)" stroke="#0F2C59" stroke-width="0.8"/>
  <text x="55" y="95" font-family="monospace" font-size="11" fill="#0F2C59">- [x] 1. 핵심 추상 정의</text>
  <text x="55" y="111" font-family="monospace" font-size="11" fill="#0F2C59">- [x] 2. 차이점 정리</text>
  <text x="55" y="127" font-family="monospace" font-size="11" fill="#6B6B72">- [ ] 3. 코드 예제 작성</text>
  <text x="320" y="132" text-anchor="end" font-family="sans-serif" font-size="9" fill="#6B6B72">예시 todo</text>

  <rect x="40" y="146" width="120" height="20" rx="4" fill="#0F2C59"/>
  <text x="100" y="161" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#FFFFFF">write_todos</text>

  <!-- ============ 우상: Filesystem · 노트 ============ -->
  <rect x="370" y="8" width="330" height="165" rx="8" fill="#FFFFFF" stroke="#0F2C59" stroke-width="1.5"/>
  <text x="390" y="33" font-family="sans-serif" font-size="11" fill="#6B6B72">METAPHOR</text>
  <text x="390" y="51" font-family="sans-serif" font-size="14" font-weight="bold" fill="#0F2C59">파일시스템</text>
  <text x="490" y="51" font-family="sans-serif" font-size="11" fill="#6B6B72">· Filesystem</text>
  <text x="390" y="69" font-family="sans-serif" font-size="11" font-weight="bold" fill="#0F2C59"><tspan>"노트"</tspan></text>

  <rect x="390" y="79" width="290" height="58" rx="4" fill="rgba(15,44,89,0.06)" stroke="#0F2C59" stroke-width="0.8"/>
  <text x="405" y="95" font-family="monospace" font-size="11" fill="#0F2C59">notes/</text>
  <text x="415" y="111" font-family="monospace" font-size="11" fill="#0F2C59">  search_01.md</text>
  <text x="415" y="127" font-family="monospace" font-size="11" fill="#0F2C59">  draft.md</text>
  <text x="670" y="132" text-anchor="end" font-family="sans-serif" font-size="9" fill="#6B6B72">예시 트리</text>

  <rect x="390" y="146" width="270" height="20" rx="4" fill="#0F2C59"/>
  <text x="525" y="161" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#FFFFFF">ls / read_file / write_file / edit_file</text>

  <!-- ============ 좌하: Subagents · 인턴 ============ -->
  <rect x="20" y="188" width="330" height="165" rx="8" fill="#FFFFFF" stroke="#0F2C59" stroke-width="1.5"/>
  <text x="40" y="213" font-family="sans-serif" font-size="11" fill="#6B6B72">METAPHOR</text>
  <text x="40" y="231" font-family="sans-serif" font-size="14" font-weight="bold" fill="#0F2C59">서브에이전트</text>
  <text x="148" y="231" font-family="sans-serif" font-size="11" fill="#6B6B72">· Subagents</text>
  <text x="40" y="249" font-family="sans-serif" font-size="11" font-weight="bold" fill="#0F2C59"><tspan>"인턴"</tspan></text>

  <rect x="40" y="259" width="290" height="58" rx="4" fill="rgba(15,44,89,0.06)" stroke="#0F2C59" stroke-width="0.8"/>
  <text x="55" y="275" font-family="monospace" font-size="11" fill="#0F2C59">메인: task("스펙 분석")</text>
  <text x="55" y="291" font-family="sans-serif" font-size="11" fill="#0F2C59">  ↳ 인턴이 격리된 곳에서</text>
  <text x="55" y="307" font-family="sans-serif" font-size="11" fill="#0F2C59">     검색 30회 후 한 단락 회신</text>
  <text x="320" y="312" text-anchor="end" font-family="sans-serif" font-size="9" fill="#6B6B72">위임 시퀀스</text>

  <rect x="40" y="326" width="60" height="20" rx="4" fill="#0F2C59"/>
  <text x="70" y="341" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#FFFFFF">task</text>

  <!-- ============ 우하: Long-term Memory · 일기장 ============ -->
  <rect x="370" y="188" width="330" height="165" rx="8" fill="#FFFFFF" stroke="#0F2C59" stroke-width="1.5"/>
  <text x="390" y="213" font-family="sans-serif" font-size="11" fill="#6B6B72">METAPHOR</text>
  <text x="390" y="231" font-family="sans-serif" font-size="14" font-weight="bold" fill="#0F2C59">장기 메모리</text>
  <text x="490" y="231" font-family="sans-serif" font-size="11" fill="#6B6B72">· Long-term Memory</text>
  <text x="390" y="249" font-family="sans-serif" font-size="11" font-weight="bold" fill="#0F2C59"><tspan>"일기장"</tspan></text>

  <rect x="390" y="259" width="290" height="58" rx="4" fill="rgba(15,44,89,0.06)" stroke="#0F2C59" stroke-width="0.8"/>
  <text x="405" y="275" font-family="monospace" font-size="11" fill="#0F2C59">/memories/</text>
  <text x="415" y="291" font-family="monospace" font-size="11" fill="#0F2C59">  user_preferences.md</text>
  <text x="415" y="307" font-family="monospace" font-size="11" fill="#0F2C59">  past_decisions.md</text>
  <text x="670" y="312" text-anchor="end" font-family="sans-serif" font-size="9" fill="#6B6B72">예시 트리</text>

  <rect x="390" y="326" width="280" height="20" rx="4" fill="#0F2C59"/>
  <text x="530" y="341" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#FFFFFF">LangGraph Store · CompositeBackend</text>
</svg>
