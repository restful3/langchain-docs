<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 320" width="820" height="320">
  <rect x="0" y="0" width="820" height="320" fill="#FAFAF9"/>

  <!-- ============ 좌측: 모델의 도구 호출 ============ -->
  <rect x="20" y="120" width="180" height="100" rx="6" fill="#FFFFFF" stroke="#0F2C59" stroke-width="1.5"/>
  <text x="110" y="143" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#0F2C59">모델의 도구 호출</text>
  <text x="110" y="167" text-anchor="middle" font-family="monospace" font-size="11" fill="#0F2C59">write_file("a.md")</text>
  <text x="110" y="186" text-anchor="middle" font-family="monospace" font-size="11" fill="#0F2C59">write_file(</text>
  <text x="110" y="201" text-anchor="middle" font-family="monospace" font-size="11" fill="#0F2C59">  "/memories/x.md")</text>

  <!-- → 가운데 -->
  <path d="M 200 170 L 248 170" stroke="#6B6B72" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- ============ 가운데: FilesystemMiddleware (강조) ============ -->
  <rect x="250" y="120" width="180" height="100" rx="6" fill="rgba(15,44,89,0.06)" stroke="#0F2C59" stroke-width="1.5"/>
  <text x="340" y="146" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#0F2C59">FilesystemMiddleware</text>
  <text x="340" y="170" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#0F2C59">CompositeBackend</text>
  <text x="340" y="187" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#6B6B72">prefix 라우팅</text>
  <text x="340" y="204" text-anchor="middle" font-family="monospace" font-size="10" fill="#0F2C59">prefix="/memories/"</text>

  <!-- ============ 분기 화살표 + 라벨 ============ -->
  <!-- 위쪽: /memories/* 매치 → StoreBackend (사선 + 라벨 위쪽) -->
  <path d="M 430 145 L 540 80" stroke="#6B6B72" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <rect x="445" y="98" width="80" height="18" rx="3" fill="#FAFAF9"/>
  <text x="485" y="111" text-anchor="middle" font-family="monospace" font-size="11" fill="#0F2C59">/memories/*</text>

  <!-- 아래쪽: 기타 경로 → StateBackend (사선 + 라벨 아래쪽) -->
  <path d="M 430 195 L 540 260" stroke="#6B6B72" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <rect x="453" y="222" width="64" height="18" rx="3" fill="#FAFAF9"/>
  <text x="485" y="235" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#0F2C59">기타 경로</text>

  <!-- ============ 우상: StoreBackend (장기 메모리) ============ -->
  <rect x="540" y="40" width="260" height="80" rx="6" fill="#FFFFFF" stroke="#0F2C59" stroke-width="1.5"/>
  <text x="670" y="65" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#0F2C59">StoreBackend</text>
  <text x="670" y="86" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#0F2C59">LangGraph Store</text>
  <text x="670" y="105" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#6B6B72">thread 횡단 영구 · 장기 메모리</text>

  <!-- ============ 우하: StateBackend (단기, 기본값) ============ -->
  <rect x="540" y="220" width="260" height="80" rx="6" fill="#FFFFFF" stroke="#0F2C59" stroke-width="1.5"/>
  <text x="670" y="245" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#0F2C59">StateBackend</text>
  <text x="670" y="266" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#0F2C59">LangGraph state (한 thread)</text>
  <text x="670" y="285" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#6B6B72">기본값 — 단기 / 임시</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6.5" refY="2.5" orient="auto">
      <path d="M 0 0 L 6.5 2.5 L 0 5 z" fill="#6B6B72"/>
    </marker>
  </defs>
</svg>
