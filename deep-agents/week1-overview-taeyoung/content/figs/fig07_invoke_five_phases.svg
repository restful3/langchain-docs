<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="800" height="240">
  <rect x="0" y="0" width="800" height="240" fill="#FAFAF9"/>

  <!-- 입력 (① 위): User Query -->
  <text x="120" y="22" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#0F2C59">User Query</text>
  <path d="M 120 30 L 120 58" stroke="#6B6B72" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- 5 박스 가로 행 — canvas 800, 5×120 + 4×20 = 680, 좌우 마진 60/60 -->
  <!-- ① 계획 수립 -->
  <rect x="60" y="70" width="120" height="90" rx="6" fill="#FFFFFF" stroke="#0F2C59" stroke-width="1.5"/>
  <text x="120" y="93" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#0F2C59">① 계획 수립</text>
  <text x="120" y="118" text-anchor="middle" font-family="monospace" font-size="11" fill="#0F2C59">write_todos</text>
  <text x="120" y="140" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#6B6B72">4~7 항목 todo</text>

  <!-- ② 검색 수행 -->
  <path d="M 180 115 L 198 115" stroke="#6B6B72" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <rect x="200" y="70" width="120" height="90" rx="6" fill="#FFFFFF" stroke="#0F2C59" stroke-width="1.5"/>
  <text x="260" y="93" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#0F2C59">② 검색 수행</text>
  <text x="260" y="118" text-anchor="middle" font-family="monospace" font-size="11" fill="#0F2C59">internet_search</text>
  <text x="260" y="140" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#6B6B72">+ 사용자 도구</text>

  <!-- ③ 컨텍스트 -->
  <path d="M 320 115 L 338 115" stroke="#6B6B72" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <rect x="340" y="70" width="120" height="90" rx="6" fill="#FFFFFF" stroke="#0F2C59" stroke-width="1.5"/>
  <text x="400" y="93" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#0F2C59">③ 컨텍스트</text>
  <text x="400" y="115" text-anchor="middle" font-family="monospace" font-size="11" fill="#0F2C59">write_file</text>
  <text x="400" y="130" text-anchor="middle" font-family="monospace" font-size="11" fill="#0F2C59">read_file</text>
  <text x="400" y="148" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#6B6B72">큰 결과 오프로드</text>

  <!-- ④ 위임 -->
  <path d="M 460 115 L 478 115" stroke="#6B6B72" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <rect x="480" y="70" width="120" height="90" rx="6" fill="#FFFFFF" stroke="#0F2C59" stroke-width="1.5"/>
  <text x="540" y="93" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#0F2C59">④ 위임</text>
  <text x="540" y="118" text-anchor="middle" font-family="monospace" font-size="11" fill="#0F2C59">task</text>
  <text x="540" y="140" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#6B6B72">서브에이전트 격리</text>

  <!-- ⑤ 종합 (강조: inverse) -->
  <path d="M 600 115 L 618 115" stroke="#6B6B72" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <rect x="620" y="70" width="120" height="90" rx="6" fill="#0F2C59"/>
  <text x="680" y="93" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">⑤ 종합</text>
  <text x="680" y="118" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#FFFFFF">todo 모두 [x]</text>
  <text x="680" y="140" text-anchor="middle" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,0.75)">최종 응답 생성</text>

  <!-- 출력 (⑤ 아래): result["messages"][-1] -->
  <path d="M 680 162 L 680 188" stroke="#6B6B72" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="680" y="212" text-anchor="middle" font-family="monospace" font-size="11" fill="#0F2C59">result["messages"][-1]</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6.5" refY="2.5" orient="auto">
      <path d="M 0 0 L 6.5 2.5 L 0 5 z" fill="#6B6B72"/>
    </marker>
  </defs>
</svg>
