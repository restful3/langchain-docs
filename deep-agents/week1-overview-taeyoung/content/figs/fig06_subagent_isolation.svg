<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 280" width="760" height="280">
  <rect x="0" y="0" width="760" height="280" fill="#FAFAF9"/>

  <!-- 그룹 헤더 -->
  <text x="160" y="25" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#6B6B72">MAIN AGENT · 일반 도구 + task</text>
  <text x="600" y="25" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#6B6B72">SUBAGENT · 검색 한정 (격리)</text>

  <!-- ============ 좌: Main Agent ============ -->
  <rect x="30" y="40" width="260" height="210" rx="8" fill="#FFFFFF" stroke="#0F2C59" stroke-width="1.5"/>
  <rect x="46" y="58" width="232" height="24" rx="4" fill="rgba(15,44,89,0.06)"/>
  <text x="56" y="74" font-family="sans-serif" font-size="11" fill="#0F2C59">User: 보고서 작성해줘</text>

  <rect x="46" y="86" width="232" height="24" rx="4" fill="rgba(15,44,89,0.06)"/>
  <text x="56" y="102" font-family="monospace" font-size="11" fill="#0F2C59">AI: write_todos([...])</text>

  <rect x="46" y="114" width="232" height="24" rx="4" fill="rgba(15,44,89,0.06)"/>
  <text x="56" y="130" font-family="monospace" font-size="11" fill="#0F2C59">AI: task("스펙 분석", ...)</text>

  <!-- 분석 결과 (강조) -->
  <rect x="46" y="142" width="232" height="24" rx="4" fill="#0F2C59"/>
  <text x="56" y="158" font-family="sans-serif" font-size="11" fill="#FFFFFF">↳ Tool: 분석 결과 (한 단락)</text>

  <rect x="46" y="170" width="232" height="24" rx="4" fill="rgba(15,44,89,0.06)"/>
  <text x="56" y="186" font-family="monospace" font-size="11" fill="#0F2C59">AI: write_file("report.md", ...)</text>

  <text x="160" y="220" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#6B6B72">컨텍스트: 분석 결과 한 단락만 보유</text>

  <!-- ============ 위임/반환 화살표 (가운데 영역) ============ -->
  <!-- task() 호출 (가는 방향) -->
  <path d="M 290 110 L 470 75" stroke="#6B6B72" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <rect x="345" y="84" width="80" height="18" rx="3" fill="#FAFAF9"/>
  <text x="385" y="97" text-anchor="middle" font-family="monospace" font-size="11" fill="#0F2C59">task()</text>

  <!-- 결과 요약만 반환 (오는 방향) -->
  <path d="M 470 200 L 290 158" stroke="#6B6B72" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <rect x="335" y="170" width="100" height="18" rx="3" fill="#FAFAF9"/>
  <text x="385" y="183" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#0F2C59">한 단락 요약</text>

  <!-- ============ 우: Subagent (점선 외곽) ============ -->
  <rect x="470" y="40" width="260" height="210" rx="8" fill="#FFFFFF" stroke="#0F2C59" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="486" y="58" width="232" height="24" rx="4" fill="rgba(15,44,89,0.06)"/>
  <text x="496" y="74" font-family="sans-serif" font-size="11" fill="#0F2C59">Sub: 검색1 → 결과</text>

  <rect x="486" y="86" width="232" height="24" rx="4" fill="rgba(15,44,89,0.06)"/>
  <text x="496" y="102" font-family="sans-serif" font-size="11" fill="#0F2C59">Sub: 검색2 → 결과</text>

  <rect x="486" y="114" width="232" height="24" rx="4" fill="rgba(15,44,89,0.06)"/>
  <text x="496" y="130" font-family="sans-serif" font-size="11" fill="#0F2C59">Sub: ... 검색 30회 ...</text>

  <rect x="486" y="142" width="232" height="24" rx="4" fill="rgba(15,44,89,0.06)"/>
  <text x="496" y="158" font-family="monospace" font-size="11" fill="#0F2C59">Sub: write_file("notes/x.md")</text>

  <!-- 최종 한 단락 (강조) -->
  <rect x="486" y="170" width="232" height="24" rx="4" fill="#0F2C59"/>
  <text x="496" y="186" font-family="sans-serif" font-size="11" fill="#FFFFFF">Sub: 최종 한 단락 요약</text>

  <text x="600" y="220" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#6B6B72">컨텍스트: 30회 검색 모두 보유 (격리)</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6.5" refY="2.5" orient="auto">
      <path d="M 0 0 L 6.5 2.5 L 0 5 z" fill="#6B6B72"/>
    </marker>
  </defs>
</svg>
