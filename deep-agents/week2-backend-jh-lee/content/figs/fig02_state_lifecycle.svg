<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" width="720" height="360">
  <rect x="0" y="0" width="720" height="360" fill="#FAFAF9"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6B6B72"/>
    </marker>
  </defs>

  <!-- 헤더 -->
  <text x="360" y="32" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#6B6B72">STATEBACKEND — THREAD-SCOPED LIFECYCLE</text>

  <!-- ====== THREAD 1 (영속 동안) ====== -->
  <text x="50" y="80" text-anchor="start" font-family="sans-serif" font-size="11" font-weight="bold" fill="#0F2C59">thread_id = "demo-1"</text>

  <!-- 타임라인 -->
  <line x1="50" y1="115" x2="490" y2="115" stroke="#0F2C59" stroke-width="1.5"/>
  <line x1="50" y1="115" x2="50" y2="110" stroke="#0F2C59" stroke-width="1.5"/>
  <line x1="490" y1="115" x2="490" y2="110" stroke="#0F2C59" stroke-width="1.5"/>

  <!-- checkpoint 1: write -->
  <circle cx="120" cy="115" r="6" fill="#0F2C59"/>
  <text x="120" y="138" text-anchor="middle" font-family="monospace" font-size="10" fill="#0F2C59">write_file</text>
  <text x="120" y="151" text-anchor="middle" font-family="monospace" font-size="9" fill="#6B6B72">/notes/n.md</text>

  <rect x="85" y="78" width="70" height="22" rx="3" fill="#FFFFFF" stroke="#0F2C59" stroke-width="1"/>
  <text x="120" y="93" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#0F2C59">ckpt-1</text>

  <!-- checkpoint 2: read OK -->
  <circle cx="250" cy="115" r="6" fill="#0F2C59"/>
  <text x="250" y="138" text-anchor="middle" font-family="monospace" font-size="10" fill="#0F2C59">read_file</text>
  <text x="250" y="151" text-anchor="middle" font-family="monospace" font-size="9" fill="#6B6B72">→ "hello"</text>

  <rect x="215" y="78" width="70" height="22" rx="3" fill="#FFFFFF" stroke="#0F2C59" stroke-width="1"/>
  <text x="250" y="93" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#0F2C59">ckpt-2</text>

  <!-- checkpoint 3: edit -->
  <circle cx="380" cy="115" r="6" fill="#0F2C59"/>
  <text x="380" y="138" text-anchor="middle" font-family="monospace" font-size="10" fill="#0F2C59">edit_file</text>
  <text x="380" y="151" text-anchor="middle" font-family="monospace" font-size="9" fill="#6B6B72">→ "hi"</text>

  <rect x="345" y="78" width="70" height="22" rx="3" fill="#FFFFFF" stroke="#0F2C59" stroke-width="1"/>
  <text x="380" y="93" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#0F2C59">ckpt-3</text>

  <!-- thread 종료 마커 -->
  <line x1="490" y1="100" x2="490" y2="130" stroke="#6B6B72" stroke-width="1.5"/>
  <text x="490" y="155" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#6B6B72">thread end</text>

  <!-- state 영역 (위 바깥) -->
  <rect x="35" y="170" width="475" height="50" rx="6" fill="#FFFFFF" stroke="#0F2C59" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="48" y="190" text-anchor="start" font-family="sans-serif" font-size="10" font-weight="bold" fill="#6B6B72">LangGraph state (this thread)</text>
  <text x="48" y="208" text-anchor="start" font-family="monospace" font-size="10" fill="#0F2C59">files: {'/notes/n.md': 'hi'}    ← checkpoint 채널에 저장</text>

  <!-- ====== THREAD 2 (휘발 후) ====== -->
  <text x="50" y="255" text-anchor="start" font-family="sans-serif" font-size="11" font-weight="bold" fill="#0F2C59">thread_id = "demo-2"</text>

  <line x1="50" y1="285" x2="270" y2="285" stroke="#6B6B72" stroke-width="1.5" stroke-dasharray="3,3"/>
  <circle cx="120" cy="285" r="6" fill="#FFFFFF" stroke="#6B6B72" stroke-width="1.5"/>
  <text x="120" y="305" text-anchor="middle" font-family="monospace" font-size="10" fill="#6B6B72">read_file</text>
  <text x="120" y="318" text-anchor="middle" font-family="monospace" font-size="9" fill="#6B6B72">→ error: 없음</text>

  <!-- 빈 state -->
  <rect x="35" y="335" width="475" height="20" rx="4" fill="#FFFFFF" stroke="#6B6B72" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="48" y="349" text-anchor="start" font-family="monospace" font-size="10" fill="#6B6B72">files: {}   (새 thread = 빈 state)</text>

  <!-- ====== 우측: 핵심 캡션 ====== -->
  <line x1="540" y1="60" x2="540" y2="345" stroke="#6B6B72" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.5"/>

  <text x="555" y="80" text-anchor="start" font-family="sans-serif" font-size="11" font-weight="bold" fill="#6B6B72">핵심 사실</text>

  <text x="555" y="108" text-anchor="start" font-family="sans-serif" font-size="10" fill="#0F2C59">• state ↔ thread 가 1:1</text>
  <text x="555" y="125" text-anchor="start" font-family="sans-serif" font-size="10" fill="#0F2C59">• checkpoint 가 켜져 있는 동안</text>
  <text x="555" y="138" text-anchor="start" font-family="sans-serif" font-size="10" fill="#0F2C59">  thread 자체는 며칠도 생존</text>
  <text x="555" y="155" text-anchor="start" font-family="sans-serif" font-size="10" fill="#0F2C59">• 새 thread = 새로운 빈 state</text>
  <text x="555" y="172" text-anchor="start" font-family="sans-serif" font-size="10" fill="#0F2C59">• 자동 eviction —</text>
  <text x="555" y="185" text-anchor="start" font-family="sans-serif" font-size="10" fill="#0F2C59">  thread 끝 → cleanup 자동</text>

  <text x="555" y="220" text-anchor="start" font-family="sans-serif" font-size="11" font-weight="bold" fill="#6B6B72">베스트 케이스</text>

  <text x="555" y="245" text-anchor="start" font-family="sans-serif" font-size="10" fill="#0F2C59">• 큰 도구 결과 scratch</text>
  <text x="555" y="262" text-anchor="start" font-family="sans-serif" font-size="10" fill="#0F2C59">• 단발 분석 / 데모</text>
  <text x="555" y="279" text-anchor="start" font-family="sans-serif" font-size="10" fill="#0F2C59">• 짧은 대화 세션</text>

  <text x="555" y="320" text-anchor="start" font-family="sans-serif" font-size="9" font-style="italic" fill="#6B6B72">기본값 (create_deep_agent</text>
  <text x="555" y="334" text-anchor="start" font-family="sans-serif" font-size="9" font-style="italic" fill="#6B6B72">한 호출만 했을 때).</text>
</svg>
