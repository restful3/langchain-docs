<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" width="720" height="360">
  <rect x="0" y="0" width="720" height="360" fill="#FAFAF9"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6B6B72"/>
    </marker>
  </defs>

  <!-- 헤더 -->
  <text x="360" y="32" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#6B6B72">STOREBACKEND — TUPLE NAMESPACE TREE</text>

  <!-- 루트: BaseStore -->
  <rect x="290" y="55" width="140" height="42" rx="6" fill="#0F2C59"/>
  <text x="360" y="74" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#FFFFFF">BaseStore</text>
  <text x="360" y="90" text-anchor="middle" font-family="monospace" font-size="9" fill="#FFFFFF">(InMemory · Postgres · Redis)</text>

  <!-- 분기선 -->
  <path d="M 360 97 L 360 115" stroke="#6B6B72" stroke-width="1.5" fill="none"/>
  <path d="M 150 130 L 360 115 L 570 130" stroke="#6B6B72" stroke-width="1.2" fill="none" opacity="0.6"/>

  <!-- 좌측 namespace -->
  <rect x="65" y="135" width="170" height="40" rx="6" fill="#FFFFFF" stroke="#0F2C59" stroke-width="1.5"/>
  <text x="150" y="152" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#6B6B72">namespace tuple</text>
  <text x="150" y="168" text-anchor="middle" font-family="monospace" font-size="11" fill="#0F2C59">("user_a", "memories")</text>

  <!-- 중앙 namespace -->
  <rect x="275" y="135" width="170" height="40" rx="6" fill="#FFFFFF" stroke="#0F2C59" stroke-width="1.5"/>
  <text x="360" y="152" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#6B6B72">namespace tuple</text>
  <text x="360" y="168" text-anchor="middle" font-family="monospace" font-size="11" fill="#0F2C59">("user_b", "memories")</text>

  <!-- 우측 namespace -->
  <rect x="485" y="135" width="170" height="40" rx="6" fill="#FFFFFF" stroke="#0F2C59" stroke-width="1.5"/>
  <text x="570" y="152" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#6B6B72">namespace tuple</text>
  <text x="570" y="168" text-anchor="middle" font-family="monospace" font-size="11" fill="#0F2C59">("proj_x", "docs")</text>

  <!-- 각 namespace 의 key-value 분기 -->
  <line x1="150" y1="175" x2="150" y2="195" stroke="#6B6B72" stroke-width="1" opacity="0.5"/>
  <line x1="360" y1="175" x2="360" y2="195" stroke="#6B6B72" stroke-width="1" opacity="0.5"/>
  <line x1="570" y1="175" x2="570" y2="195" stroke="#6B6B72" stroke-width="1" opacity="0.5"/>

  <!-- 좌측 keys -->
  <rect x="80" y="195" width="140" height="22" rx="3" fill="#FFFFFF" stroke="#6B6B72" stroke-width="0.8"/>
  <text x="92" y="210" text-anchor="start" font-family="monospace" font-size="10" fill="#0F2C59">"release"</text>
  <text x="215" y="210" text-anchor="end" font-family="monospace" font-size="9" fill="#6B6B72">→ "5/22"</text>

  <rect x="80" y="220" width="140" height="22" rx="3" fill="#FFFFFF" stroke="#6B6B72" stroke-width="0.8"/>
  <text x="92" y="235" text-anchor="start" font-family="monospace" font-size="10" fill="#0F2C59">"prefs"</text>
  <text x="215" y="235" text-anchor="end" font-family="monospace" font-size="9" fill="#6B6B72">→ {...}</text>

  <!-- 중앙 keys -->
  <rect x="290" y="195" width="140" height="22" rx="3" fill="#FFFFFF" stroke="#6B6B72" stroke-width="0.8"/>
  <text x="302" y="210" text-anchor="start" font-family="monospace" font-size="10" fill="#0F2C59">"release"</text>
  <text x="425" y="210" text-anchor="end" font-family="monospace" font-size="9" fill="#6B6B72">→ "6/1"</text>

  <rect x="290" y="220" width="140" height="22" rx="3" fill="#FFFFFF" stroke="#6B6B72" stroke-width="0.8"/>
  <text x="302" y="235" text-anchor="start" font-family="monospace" font-size="10" fill="#0F2C59">"todos"</text>
  <text x="425" y="235" text-anchor="end" font-family="monospace" font-size="9" fill="#6B6B72">→ [...]</text>

  <!-- 우측 keys -->
  <rect x="500" y="195" width="140" height="22" rx="3" fill="#FFFFFF" stroke="#6B6B72" stroke-width="0.8"/>
  <text x="512" y="210" text-anchor="start" font-family="monospace" font-size="10" fill="#0F2C59">"spec.md"</text>
  <text x="635" y="210" text-anchor="end" font-family="monospace" font-size="9" fill="#6B6B72">→ "..."</text>

  <rect x="500" y="220" width="140" height="22" rx="3" fill="#FFFFFF" stroke="#6B6B72" stroke-width="0.8"/>
  <text x="512" y="235" text-anchor="start" font-family="monospace" font-size="10" fill="#0F2C59">"README"</text>
  <text x="635" y="235" text-anchor="end" font-family="monospace" font-size="9" fill="#6B6B72">→ "..."</text>

  <!-- 분리선 -->
  <line x1="40" y1="260" x2="680" y2="260" stroke="#6B6B72" stroke-width="0.5" stroke-dasharray="3,3" opacity="0.4"/>

  <!-- StoreBackend 의 경로 매핑 -->
  <text x="50" y="285" text-anchor="start" font-family="sans-serif" font-size="11" font-weight="bold" fill="#6B6B72">에이전트 경로 ↔ namespace 매핑 (StoreBackend 가 적용)</text>

  <text x="50" y="308" text-anchor="start" font-family="monospace" font-size="10" fill="#0F2C59">/memories/release.md</text>
  <text x="225" y="308" text-anchor="start" font-family="monospace" font-size="10" fill="#6B6B72">→  (user_a, "memories"), "release"</text>

  <text x="50" y="324" text-anchor="start" font-family="monospace" font-size="10" fill="#0F2C59">/docs/spec.md</text>
  <text x="225" y="324" text-anchor="start" font-family="monospace" font-size="10" fill="#6B6B72">→  (proj_x, "docs"), "spec.md"</text>

  <text x="360" y="350" text-anchor="middle" font-family="sans-serif" font-size="10" font-style="italic" fill="#6B6B72">thread 가 끝나도 namespace 는 살아 있다 — 다음 thread, 다른 사용자가 그대로 읽음</text>
</svg>
