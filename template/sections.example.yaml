# AI Odyssey publisher — section label map.
#
# 콘텐츠 폴더(예: content/) 옆에 `sections.yaml` 로 복사해서 사용한다.
# 빌드 시 자동으로 로드되며, 부재 시에는 파일명 NN_*.md 에서 NN 추출해 자동 생성.
#
# Keys: 콘텐츠 폴더 안의 파일명
# Values: [number, kicker, title, subtitle]
#   number   — 2-digit zero-padded string (섹션 ID·디바이더 번호)
#   kicker   — 디바이더 페이지 상단 칩 (예: "섹션 01" · "부록")
#                 ⚠️ "부록" 으로 설정된 항목은 첫 h2 를 유지하는 분기로 처리됨
#   title    — 디바이더 큰 제목. 빈 문자열이면 미표시
#   subtitle — 제목 아래 한 줄 캡션
#
# 예시 (Computer Use 외부판 7섹션):
sections:
  "01_section1_overview.md":     ["01", "섹션 01", "Computer Use",                     "무엇이고, 왜 지금인가"]
  "02_section2_big3.md":         ["02", "섹션 02", "빅3 벤더",                         "Anthropic · OpenAI · Google"]
  "03_section3_opensource.md":   ["03", "섹션 03", "오픈소스 & 자율형 에이전트",       "Browser Use · OpenClaw · Self-Host"]
  "04_section4_demos.md":        ["04", "섹션 04", "실사용 사례 서베이",               "블로그·커뮤니티 21건 횡단 관찰"]
  "05_section5_issues.md":       ["05", "섹션 05", "이슈와 시사점",                    "거버넌스 · VPI · Silent Failure"]
  "06_section6_deepdive.md":     ["06", "섹션 06", "기술 딥다이브 & 결론",             "구현·운영 실무자용 상세 + 리포트 결론"]
  "07_appendix.md":              ["07", "부록",    "",                                 "용어집 · 체크리스트 · 매트릭스 · 영상 색인"]
